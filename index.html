<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay Slideshow</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
    }

    #container {
        position: relative;
        width: 1920px;
        height: 1080px;
    }

    img {
        position: absolute;
        width: 1920px;
        height: 1080px;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 2s ease-in-out;
    }

    img.active {
        opacity: 1;
    }
</style>
</head>

<body>
<div id="container">
    <img src="https://raw.githubusercontent.com/protectorebay/guige-obrazky/3d6f7108815be010b50781e4c73d470a6ef0be4a/1.png">
    <img src="https://raw.githubusercontent.com/protectorebay/guige-obrazky/3d6f7108815be010b50781e4c73d470a6ef0be4a/2.png">
    <img src="https://raw.githubusercontent.com/protectorebay/guige-obrazky/3d6f7108815be010b50781e4c73d470a6ef0be4a/3.png">
    <img src="https://raw.githubusercontent.com/protectorebay/guige-obrazky/3d6f7108815be010b50781e4c73d470a6ef0be4a/4.png">
</div>

<script>
    const images = document.querySelectorAll('#container img');

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function loop() {
        while (true) {
            for (let i = 0; i < images.length; i++) {

                images[i].classList.add('active'); // fade in
                await sleep(15000);                // show 15s

                images[i].classList.remove('active'); // fade out
                await sleep(5000);                    // gap 5s
            }

            // PAUSE AFTER FULL LOOP
            await sleep(300000); // 5 minutes
        }
    }

    loop();
</script>

</body>
</html>
